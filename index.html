<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEC EDGAR Financial Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>

    <style>
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .animate-fade-in{animation:fadeIn .4s ease-out}
        .dark-scroll::-webkit-scrollbar{height:6px;width:6px}.dark-scroll::-webkit-scrollbar-track{background:transparent}.dark-scroll::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}.dark-scroll{scrollbar-width:thin;scrollbar-color:#334155 transparent}
        .light-scroll::-webkit-scrollbar{height:6px;width:6px}.light-scroll::-webkit-scrollbar-track{background:transparent}.light-scroll::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}.light-scroll{scrollbar-width:thin;scrollbar-color:#cbd5e1 transparent}
        .console-wrap{display:grid;grid-template-rows:0fr;transition:grid-template-rows .25s ease-out,opacity .25s ease-out;opacity:0}
        .console-wrap.open{grid-template-rows:1fr;opacity:1}.console-inner{overflow:hidden}

        /* Range slider */
        input[type=range].scale-slider{-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;outline:none;cursor:pointer}
        input[type=range].scale-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;cursor:pointer}
        input[type=range].scale-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;cursor:pointer;border:none}
        .dark input[type=range].scale-slider{background:#334155}
        .dark input[type=range].scale-slider::-webkit-slider-thumb{background:#34d399}
        .dark input[type=range].scale-slider::-moz-range-thumb{background:#34d399}
        html:not(.dark) input[type=range].scale-slider{background:#cbd5e1}
        html:not(.dark) input[type=range].scale-slider::-webkit-slider-thumb{background:#059669}
        html:not(.dark) input[type=range].scale-slider::-moz-range-thumb{background:#059669}
    </style>
</head>
<body class="min-h-screen">
<div id="root"></div>

<script type="text/babel" data-presets="react">
    const{useState,useEffect,useRef,useCallback,useMemo}=React;

    const LS_P='sec-dash-prefs',LS_C='sec-dash-cache';
    const lp=()=>{try{return JSON.parse(localStorage.getItem(LS_P))||{}}catch{return{}}};
    const sp=p=>{try{localStorage.setItem(LS_P,JSON.stringify(p))}catch{}};
    const lc=()=>{try{return JSON.parse(localStorage.getItem(LS_C))||null}catch{return null}};
    const sc=c=>{try{const j=JSON.stringify(c);if(j.length<4*1024*1024)localStorage.setItem(LS_C,j)}catch{}};
    const cc=()=>{try{localStorage.removeItem(LS_C)}catch{}};

    const WP=[8011,8010,8080,3000].map(p=>`http://localhost:${p}/proxy`);
    const DP=[8012,8010,8080,3000].map(p=>`http://localhost:${p}/proxy`);

    const CON={
        revenue:['RevenueFromContractWithCustomerExcludingAssessedTax','Revenues','SalesRevenueNet','SalesRevenueGoodsNet','RevenueFromContractWithCustomerIncludingAssessedTax'],
        costOfRevenue:['CostOfGoodsAndServicesSold','CostOfRevenue','CostOfGoodsSold'],grossProfit:['GrossProfit'],operatingIncome:['OperatingIncomeLoss'],
        netIncome:['NetIncomeLoss','NetIncomeLossAvailableToCommonStockholdersBasic','ProfitLoss'],eps:['EarningsPerShareBasic','EarningsPerShareDiluted'],
        ocf:['NetCashProvidedByUsedInOperatingActivities','NetCashProvidedByUsedInOperatingActivitiesContinuingOperations'],
        capex:['PaymentsToAcquirePropertyPlantAndEquipment','PaymentsForCapitalImprovements'],
        depreciation:['DepreciationDepletionAndAmortization','Depreciation','DepreciationAndAmortization','DepreciationAmortizationAndAccretionNet'],
        dividendsPaid:['PaymentsOfDividends','PaymentsOfDividendsCommonStock'],shareRepurchase:['PaymentsForRepurchaseOfCommonStock','PaymentsForRepurchaseOfEquity'],
        assets:['Assets'],currentAssets:['AssetsCurrent'],liabilities:['Liabilities'],currentLiabilities:['LiabilitiesCurrent'],
        equity:['StockholdersEquity','StockholdersEquityIncludingPortionAttributableToNoncontrollingInterest'],
        cash:['CashAndCashEquivalentsAtCarryingValue','CashCashEquivalentsAndShortTermInvestments'],
        shortTermDebt:['ShortTermBorrowings','DebtCurrent'],longTermDebt:['LongTermDebt','LongTermDebtNoncurrent'],
        inventory:['InventoryNet'],receivables:['AccountsReceivableNetCurrent','AccountsReceivableNet'],payables:['AccountsPayableCurrent'],
        goodwill:['Goodwill'],intangibles:['IntangibleAssetsNetExcludingGoodwill'],ppe:['PropertyPlantAndEquipmentNet'],
        sharesOut:['CommonStockSharesOutstanding','WeightedAverageNumberOfShareOutstandingBasicAndDiluted','WeightedAverageNumberOfDilutedSharesOutstanding'],
        rnd:['ResearchAndDevelopmentExpense'],sga:['SellingGeneralAndAdministrativeExpense'],
    };

    const SEC=[
        {title:'📊 Income Statement',color:'emerald',hc:'from-emerald-900/30 to-teal-900/20',hcL:'from-emerald-50 to-teal-50',
            metrics:[{key:'revenue',label:'Revenue',unit:'$M'},{key:'costOfRevenue',label:'Cost of Revenue',unit:'$M'},{key:'grossProfit',label:'Gross Profit',unit:'$M'},{key:'rnd',label:'R&D Expense',unit:'$M'},{key:'sga',label:'SG&A Expense',unit:'$M'},{key:'operatingIncome',label:'Operating Income',unit:'$M'},{key:'netIncome',label:'Net Income',unit:'$M'},{key:'eps',label:'EPS',unit:'$',raw:true}],
            computed:[{key:'grossMargin',label:'Gross Margin',unit:'%'},{key:'netMargin',label:'Net Margin',unit:'%'},{key:'opMargin',label:'Operating Margin',unit:'%'}]},
        {title:'💰 Cash Flow',color:'blue',hc:'from-blue-900/30 to-cyan-900/20',hcL:'from-blue-50 to-cyan-50',
            metrics:[{key:'ocf',label:'Operating CF',unit:'$M'},{key:'capex',label:'CapEx',unit:'$M'},{key:'depreciation',label:'D&A',unit:'$M'},{key:'dividendsPaid',label:'Dividends Paid',unit:'$M'},{key:'shareRepurchase',label:'Share Buybacks',unit:'$M'}],
            computed:[{key:'fcf',label:'Free Cash Flow',unit:'$M'}]},
        {title:'🏦 Balance Sheet',color:'purple',hc:'from-purple-900/30 to-pink-900/20',hcL:'from-purple-50 to-pink-50',
            metrics:[{key:'assets',label:'Total Assets',unit:'$M'},{key:'currentAssets',label:'Current Assets',unit:'$M'},{key:'cash',label:'Cash & Equiv.',unit:'$M'},{key:'receivables',label:'Receivables',unit:'$M'},{key:'inventory',label:'Inventory',unit:'$M'},{key:'ppe',label:'PP&E',unit:'$M'},{key:'goodwill',label:'Goodwill',unit:'$M'},{key:'intangibles',label:'Intangibles',unit:'$M'},{key:'liabilities',label:'Total Liabilities',unit:'$M'},{key:'currentLiabilities',label:'Current Liabilities',unit:'$M'},{key:'payables',label:'Accounts Payable',unit:'$M'},{key:'shortTermDebt',label:'Short-term Debt',unit:'$M'},{key:'longTermDebt',label:'Long-term Debt',unit:'$M'},{key:'equity',label:'Equity',unit:'$M'}],
            computed:[{key:'roe',label:'ROE',unit:'%'},{key:'roa',label:'ROA',unit:'%'},{key:'debtToEquity',label:'Debt/Equity',unit:'x'},{key:'currentRatio',label:'Current Ratio',unit:'x'}]},
        {title:'📈 Per Share & Other',color:'amber',hc:'from-amber-900/30 to-orange-900/20',hcL:'from-amber-50 to-orange-50',
            metrics:[{key:'sharesOut',label:'Shares Outstanding',unit:'#M'}],
            computed:[{key:'revenuePerShare',label:'Revenue/Share',unit:'$'},{key:'fcfPerShare',label:'FCF/Share',unit:'$'}]},
    ];

    const TC={
        emerald:{dark:{line:'#34d399',fill:'rgba(52,211,153,0.15)',text:'text-emerald-400'},light:{line:'#059669',fill:'rgba(5,150,105,0.12)',text:'text-emerald-700'}},
        blue:{dark:{line:'#60a5fa',fill:'rgba(96,165,250,0.15)',text:'text-blue-400'},light:{line:'#2563eb',fill:'rgba(37,99,235,0.12)',text:'text-blue-700'}},
        purple:{dark:{line:'#c084fc',fill:'rgba(192,132,252,0.15)',text:'text-purple-400'},light:{line:'#7c3aed',fill:'rgba(124,58,237,0.12)',text:'text-purple-700'}},
        amber:{dark:{line:'#fbbf24',fill:'rgba(251,191,36,0.15)',text:'text-amber-400'},light:{line:'#d97706',fill:'rgba(217,119,6,0.12)',text:'text-amber-700'}},
    };

    async function probe(c,p){const e=[];for(const b of c){try{const r=await fetch(b+p);if(r.ok)return{base:b,res:r};e.push(`${b}${p}→${r.status}`);}catch(x){e.push(`${b}${p}→${x.message}`);}}throw new Error('Proxy not reachable:\n'+e.join('\n'));}

    function exM(facts,keys,mode){
        if(!facts?.['us-gaap'])return[];const g=facts['us-gaap'];let r=[];
        for(const k of keys){const s=g[k]?.units?.USD||g[k]?.units?.['USD/shares']||g[k]?.units?.shares||g[k]?.units?.pure;
            if(s){if(mode==='Y')r=r.concat(s.filter(p=>p.form==='10-K'&&p.fp==='FY'));else r=r.concat(s.filter(p=>p.form==='10-Q'||(p.form==='10-K'&&p.fp==='FY')));}}
        const m=new Map();if(mode==='Y')r.sort((a,b)=>new Date(b.filed)-new Date(a.filed)).forEach(x=>{if(!m.has(x.fy))m.set(x.fy,x);});
        else r.sort((a,b)=>new Date(b.filed)-new Date(a.filed)).forEach(x=>{const k=`${x.fy}-${x.fp}`;if(!m.has(k))m.set(k,x);});
        return Array.from(m.values()).sort((a,b)=>{if(b.fy!==a.fy)return b.fy-a.fy;const o={FY:4,Q4:4,Q3:3,Q2:2,Q1:1};return(o[b.fp]||0)-(o[a.fp]||0);});
    }

    const fV=(v,u)=>{if(v==null)return'—';if(u==='$M')return new Intl.NumberFormat('en-US',{maximumFractionDigits:1}).format(v/1e6);if(u==='$')return'$'+Number(v).toFixed(2);if(u==='%')return v.toFixed(1)+'%';if(u==='x')return v.toFixed(2)+'x';if(u==='#M')return new Intl.NumberFormat('en-US',{maximumFractionDigits:1}).format(v/1e6);return String(v);};
    const fA=(v,u)=>{if(v==null)return'—';if(u==='$M'||u==='#M')return(v/1e6).toFixed(0);if(u==='$')return Number(v).toFixed(1);if(u==='%')return v.toFixed(1);if(u==='x')return v.toFixed(1);return String(v);};

    // Scale: slider 0–100, default 50 → scale 1.0. Range: 0.7x to 1.5x
    const sliderToScale = v => 0.7 + (v / 100) * 0.8; // 50 → 1.1 (slightly bigger default)
    const DEFAULT_SCALE_SLIDER = 50;

    function proc(facts,m){
        const ex={};for(const[k,c]of Object.entries(CON))ex[k]=exM(facts,c,m);
        const allE=Object.values(ex).flat();let pK;
        if(m==='Y')pK=[...new Set(allE.map(d=>d.fy))].sort((a,b)=>a-b);
        else{pK=[...new Set(allE.map(d=>`${d.fy}-${d.fp}`))];pK.sort((a,b)=>{const[ay,af]=a.split('-'),[by,bf]=b.split('-');if(ay!==by)return Number(ay)-Number(by);const o={Q1:1,Q2:2,Q3:3,FY:4,Q4:4};return(o[af]||0)-(o[bf]||0);});}
        const gv=(k,pk)=>{const a=ex[k];if(m==='Y')return a.find(d=>d.fy===pk)?.val;const[fy,fp]=pk.split('-');return a.find(d=>d.fy===Number(fy)&&d.fp===fp)?.val;};
        const gl=pk=>{if(m==='Y')return String(pk);const[fy,fp]=pk.split('-');return fp==='FY'?fy:`${fy} ${fp}`;};
        const ms={};const ak=new Set();SEC.forEach(s=>s.metrics.forEach(mt=>ak.add(mt.key)));
        for(const k of ak)ms[k]=pK.map(pk=>({label:gl(pk),value:gv(k,pk),periodKey:pk}));
        const cs=k=>pK.map(pk=>{const rev=gv('revenue',pk),gp=gv('grossProfit',pk),ni=gv('netIncome',pk),oi=gv('operatingIncome',pk),ocf=gv('ocf',pk),cx=gv('capex',pk),eq=gv('equity',pk),ast=gv('assets',pk),ltd=gv('longTermDebt',pk),std=gv('shortTermDebt',pk),ca=gv('currentAssets',pk),cl=gv('currentLiabilities',pk),sh=gv('sharesOut',pk);let v;switch(k){case'grossMargin':v=gp!=null&&rev!=null&&rev?gp/rev*100:null;break;case'netMargin':v=ni!=null&&rev!=null&&rev?ni/rev*100:null;break;case'opMargin':v=oi!=null&&rev!=null&&rev?oi/rev*100:null;break;case'fcf':v=ocf!=null&&cx!=null?ocf-cx:null;break;case'roe':v=ni!=null&&eq!=null&&eq?ni/eq*100:null;break;case'roa':v=ni!=null&&ast!=null&&ast?ni/ast*100:null;break;case'debtToEquity':{const d=(ltd||0)+(std||0);v=d&&eq?d/eq:null;break;}case'currentRatio':v=ca!=null&&cl!=null&&cl?ca/cl:null;break;case'revenuePerShare':v=rev!=null&&sh?rev/sh:null;break;case'fcfPerShare':{const f=ocf!=null&&cx!=null?ocf-cx:null;v=f!=null&&sh?f/sh:null;break;}default:v=null;}return{label:gl(pk),value:v,periodKey:pk};});
        const cS={};SEC.forEach(s=>(s.computed||[]).forEach(c=>{cS[c.key]=cs(c.key);}));
        return{metricSeries:ms,computedSeries:cS,periodKeys:pK,getLabel:gl};
    }

    const MiniChart=({data,color,unit,label,dark,scale})=>{
        const valid=data.filter(d=>d.value!=null);
        const cRef=useRef(null);
        const[cW,setCW]=useState(400);
        useEffect(()=>{if(!cRef.current)return;const ro=new ResizeObserver(e=>{for(const en of e)setCW(en.contentRect.width);});ro.observe(cRef.current);setCW(cRef.current.clientWidth);return()=>ro.disconnect();},[]);
        if(valid.length<2)return null;
        const ANG=35,RAD=ANG*Math.PI/180;
        const fs=Math.round(7*scale),fsL=Math.round(8*scale),fsT=Math.round(12*scale);
        const maxLL=Math.max(...valid.map(d=>d.label.length));
        const charW=fs*0.72;
        const angH=Math.sin(RAD)*maxLL*charW+8;
        const W=Math.max(280,cW-24);
        const PAD={t:20,r:15,b:Math.max(40,angH+10),l:Math.max(50,45*scale)};
        const H=Math.max(140,Math.min(200,W*0.4))+PAD.b-40;
        const cw=W-PAD.l-PAD.r,ch=H-PAD.t-PAD.b;
        const vals=valid.map(d=>d.value);
        let mn=Math.min(...vals),mx=Math.max(...vals);if(mn===mx){mn-=1;mx+=1;}const pd=(mx-mn)*.1;mn-=pd;mx+=pd;
        const xp=i=>PAD.l+(i/(valid.length-1))*cw;
        const yp=v=>PAD.t+ch-((v-mn)/(mx-mn))*ch;
        const pts=valid.map((d,i)=>`${xp(i)},${yp(d.value)}`).join(' ');
        const area=`${PAD.l},${PAD.t+ch} ${pts} ${xp(valid.length-1)},${PAD.t+ch}`;
        const yTicks=4;
        const yL=Array.from({length:yTicks+1},(_,i)=>{const v=mn+(mx-mn)*(i/yTicks);return{y:yp(v),label:fA(v,unit)};});
        const gc=dark?'#334155':'#e2e8f0',lcc=dark?'#64748b':'#94a3b8';
        const minSp=22;const step=Math.max(1,Math.ceil(minSp*valid.length/cw));
        return(
            <div ref={cRef} className={`rounded-lg p-3 border ${dark?'bg-slate-900/50 border-slate-700/30':'bg-white/60 border-slate-200'}`}>
                <div className={`mb-1 font-medium ${dark?'text-slate-400':'text-slate-600'}`} style={{fontSize:fsT}}>{label}</div>
                <svg viewBox={`0 0 ${W} ${H}`} className="w-full">
                    {yL.map((t,i)=>(<g key={i}><line x1={PAD.l} y1={t.y} x2={W-PAD.r} y2={t.y} stroke={gc} strokeWidth="0.5" strokeDasharray="3,3"/><text x={PAD.l-4} y={t.y+3} textAnchor="end" fill={lcc} fontSize={fsL} fontFamily="monospace">{t.label}</text></g>))}
                    <line x1={PAD.l} y1={PAD.t+ch} x2={W-PAD.r} y2={PAD.t+ch} stroke={gc} strokeWidth="0.5"/>
                    <polygon points={area} fill={color.fill}/>
                    <polyline points={pts} fill="none" stroke={color.line} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
                    {valid.map((d,i)=><circle key={i} cx={xp(i)} cy={yp(d.value)} r="3" fill={color.line}/>)}
                    {valid.map((d,i)=>{if(i%step!==0&&i!==valid.length-1)return null;const cx=xp(i),ty=PAD.t+ch;return(<g key={`x-${i}`}><line x1={cx} y1={ty} x2={cx} y2={ty+4} stroke={lcc} strokeWidth="0.5"/><text x={cx} y={ty+8} textAnchor="end" fill={lcc} fontSize={fs} fontFamily="monospace" transform={`rotate(-${ANG},${cx},${ty+8})`}>{d.label}</text></g>);})}
                </svg>
            </div>
        );
    };

    const Pill=({value,options,onChange,dark})=>(
        <div className={`flex-shrink-0 flex items-center rounded-lg p-0.5 border ${dark?'bg-slate-800 border-slate-700':'bg-slate-100 border-slate-200'}`}>
            {options.map(opt=>{const k=typeof opt==='string'?opt:opt.k,l=typeof opt==='string'?opt:opt.l;return(
                <button key={k} onClick={()=>onChange(k)} className={`px-2.5 py-1 rounded-md text-xs font-bold transition-all ${value===k?'bg-emerald-500 text-white shadow-sm':dark?'text-slate-400 hover:text-slate-200':'text-slate-500 hover:text-slate-700'}`}>{l}</button>
            );})}
        </div>
    );

    const App=()=>{
        const prefs=useMemo(()=>lp(),[]);
        const cached=useMemo(()=>lc(),[]);

        const[ticker,setTicker]=useState(prefs.ticker||'AAPL');
        const[loading,setLoading]=useState(false);
        const[error,setError]=useState(null);
        const[logs,setLogs]=useState([]);
        const[showDebug,setShowDebug]=useState(prefs.showDebug||false);
        const[company,setCompany]=useState(cached?.company||null);
        const[tickers,setTickers]=useState(null);
        const[tkL,setTkL]=useState(false);
        const[wwwOk,setWwwOk]=useState(false);
        const[wwwBase,setWwwBase]=useState(null);
        const[dataOk,setDataOk]=useState(!!cached?.company);
        const[mode,setMode]=useState(prefs.mode||'Y');
        const[view,setView]=useState(prefs.view||'T');
        const[dark,setDark]=useState(prefs.dark!==false);
        const[factsCache,setFactsCache]=useState(cached?.facts||null);
        const[pd,setPd]=useState(null);
        const[sug,setSug]=useState([]);
        const[showSug,setShowSug]=useState(false);
        const[selIdx,setSelIdx]=useState(-1);
        const[scaleSlider,setScaleSlider]=useState(prefs.scaleSlider??DEFAULT_SCALE_SLIDER);
        const iRef=useRef(null);
        const sRef=useRef(null);

        const scale=sliderToScale(scaleSlider);

        const log=msg=>{console.log(msg);setLogs(p=>[...p.slice(-29),msg]);};

        useEffect(()=>{if(cached?.facts&&cached?.company){log(`Restored ${cached.company.ticker}`);setPd(proc(cached.facts,mode));}},[]);
        useEffect(()=>{sp({ticker,mode,view,dark,showDebug,scaleSlider});},[ticker,mode,view,dark,showDebug,scaleSlider]);
        useEffect(()=>{document.documentElement.classList.toggle('dark',dark);document.body.style.backgroundColor=dark?'#0f172a':'#f8fafc';document.body.style.color=dark?'#f1f5f9':'#0f172a';},[dark]);

        const tl=useMemo(()=>{if(!tickers)return[];return Object.values(tickers).map(c=>({ticker:c.ticker,title:c.title,cik:String(c.cik_str).padStart(10,'0')}));},[tickers]);

        useEffect(()=>{init();},[]);
        useEffect(()=>{if(factsCache&&company)setPd(proc(factsCache,mode));},[mode]);

        useEffect(()=>{const h=e=>{if(sRef.current&&!sRef.current.contains(e.target)&&iRef.current&&!iRef.current.contains(e.target))setShowSug(false);};document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);},[]);

        const uSug=useCallback(val=>{if(!val||!tl.length){setSug([]);return;}const q=val.toUpperCase();setSug(tl.filter(c=>c.ticker.startsWith(q)||c.title.toUpperCase().includes(q)).slice(0,8));setSelIdx(-1);},[tl]);

        const hIC=e=>{setTicker(e.target.value);uSug(e.target.value);setShowSug(true);};
        const hIF=()=>{iRef.current?.select();if(ticker){uSug(ticker);setShowSug(true);}};
        const selS=sym=>{setTicker(sym);setShowSug(false);setSug([]);iRef.current?.blur();setTimeout(()=>search(sym),0);};

        const hKD=e=>{
            if(!showSug||!sug.length){if(e.key==='Enter'){e.preventDefault();setShowSug(false);iRef.current?.blur();search(ticker);}return;}
            if(e.key==='ArrowDown'){e.preventDefault();setSelIdx(p=>Math.min(p+1,sug.length-1));}
            else if(e.key==='ArrowUp'){e.preventDefault();setSelIdx(p=>Math.max(p-1,-1));}
            else if(e.key==='Enter'){e.preventDefault();setShowSug(false);iRef.current?.blur();if(selIdx>=0){const s=sug[selIdx].ticker;setTicker(s);search(s);}else search(ticker);}
            else if(e.key==='Escape')setShowSug(false);
        };

        const init=async()=>{
            setTkL(true);setError(null);setLogs([]);log('Probing www.sec.gov proxy…');
            try{const{base,res}=await probe(WP,'/files/company_tickers.json');setWwwOk(true);setWwwBase(base);log(`✅ www proxy: ${base}`);const d=await res.json();setTickers(d);log(`✅ ${Object.keys(d).length} tickers`);}
            catch(e){log(`❌ ${e.message}`);setError(e.message);}finally{setTkL(false);}
        };

        const search=async sym=>{
            sym=(sym||'').trim().toUpperCase();setError(null);setCompany(null);setPd(null);setFactsCache(null);
            if(!sym||!tickers)return;setLoading(true);setLogs([]);
            try{
                const co=Object.values(tickers).find(c=>c.ticker===sym);if(!co)throw new Error(`"${sym}" not found`);
                const cik=String(co.cik_str).padStart(10,'0');log(`${sym} → CIK ${cik}`);
                const{base,res}=await probe(DP,`/api/xbrl/companyfacts/CIK${cik}.json`);setDataOk(true);log(`✅ data proxy: ${base}`);if(wwwBase)log(`✅ www proxy: ${wwwBase}`);
                const facts=(await res.json()).facts;setFactsCache(facts);const comp={title:co.title,cik,ticker:sym};setCompany(comp);setPd(proc(facts,mode));sc({facts,company:comp});log('✅ Done');
            }catch(e){log(`❌ ${e.message}`);setError(e.message);cc();}finally{setLoading(false);}
        };

        const hd=s=>s&&s.some(d=>d.value!=null);

        const bg=dark?'bg-slate-900/95':'bg-white/95';
        const bdr=dark?'border-slate-800':'border-slate-200';
        const card=dark?'bg-slate-800 border-slate-700/50':'bg-white border-slate-200 shadow-sm';
        const inp=dark?'bg-slate-800 border-slate-700 text-emerald-400':'bg-slate-50 border-slate-300 text-emerald-700';
        const mt=dark?'text-slate-500':'text-slate-400';
        const t1=dark?'text-slate-300':'text-slate-700';
        const t2=dark?'text-slate-400':'text-slate-500';
        const nc=dark?'text-red-400':'text-red-600';
        const sB=dark?'bg-slate-800/90':'bg-white/90';
        const hR=dark?'hover:bg-slate-700/20':'hover:bg-slate-50';
        const scCls=dark?'dark-scroll':'light-scroll';
        const sugBg=dark?'bg-slate-800 border-slate-700':'bg-white border-slate-200 shadow-lg';
        const sugH=dark?'bg-slate-700':'bg-slate-100';
        const sugH2=dark?'hover:bg-slate-700/50':'hover:bg-slate-50';
        const dotOn=dark?'bg-emerald-500':'bg-emerald-600';
        const dotOff=dark?'bg-slate-600':'bg-slate-300';

        // Font sizes based on scale
        const tblFs=`${Math.round(14*scale)}px`;
        const tblHFs=`${Math.round(11*scale)}px`;
        const tblCellPy=`${Math.round(10*scale)}px`;

        return(
            <React.Fragment>
                <div className={`sticky top-0 z-50 ${bg} backdrop-blur-md border-b ${bdr}`}>
                    <div className="px-4 xl:px-8">
                        <div className="flex items-center gap-3 py-3">
                            <button onClick={()=>setShowDebug(p=>!p)} className={`flex-shrink-0 text-xs px-2 py-1.5 rounded transition-colors ${showDebug?(dark?'bg-slate-700 text-slate-300':'bg-slate-200 text-slate-600'):(dark?'text-slate-600 hover:text-slate-400':'text-slate-400 hover:text-slate-600')}`} title="Toggle console">⌘</button>
                            <div className="flex gap-1.5 flex-shrink-0" title={`www: ${wwwOk?'✓':'✗'}\ndata: ${dataOk?'✓':'…'}`}>
                                <div className={`h-2.5 w-2.5 rounded-full ${wwwOk?dotOn:'bg-red-500'}`}/>
                                <div className={`h-2.5 w-2.5 rounded-full ${dataOk?dotOn:tkL||loading?'bg-yellow-400 animate-pulse':dotOff}`}/>
                            </div>
                            <div className="flex-1 min-w-0 relative">
                                <input ref={iRef} type="text" value={ticker} onChange={hIC} onFocus={hIF} onKeyDown={hKD}
                                       placeholder="Ticker or company name…" className={`w-full ${inp} border rounded-lg px-3 py-2 font-mono font-bold text-sm focus:outline-none focus:border-emerald-500 transition-colors uppercase`} disabled={!tickers}/>
                                {showSug&&sug.length>0&&(
                                    <div ref={sRef} className={`absolute top-full left-0 right-0 mt-1 ${sugBg} border rounded-lg overflow-hidden z-50 max-w-xl`}>
                                        {sug.map((s,i)=>(
                                            <button key={s.ticker} onClick={()=>selS(s.ticker)} onMouseEnter={()=>setSelIdx(i)}
                                                    className={`w-full text-left px-3 py-2 flex items-center gap-3 transition-colors ${i===selIdx?sugH:sugH2}`}>
                                                <span className={`font-mono font-bold text-sm w-14 flex-shrink-0 ${dark?'text-emerald-400':'text-emerald-700'}`}>{s.ticker}</span>
                                                <span className={`text-xs truncate ${t2}`}>{s.title}</span>
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>
                            <button onClick={()=>{setShowSug(false);iRef.current?.blur();search(ticker);}} disabled={loading||!tickers}
                                    className="flex-shrink-0 flex items-center bg-emerald-500 hover:bg-emerald-400 text-white font-bold px-4 py-2 rounded-lg text-sm transition-all active:scale-95 disabled:opacity-40">
                                {loading?<div className="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"/>
                                    :<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2.5} stroke="currentColor" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>}
                            </button>
                            <button onClick={()=>setDark(d=>!d)} className={`flex-shrink-0 text-sm px-2 py-1.5 rounded transition-colors ${dark?'text-yellow-400 hover:text-yellow-300':'text-slate-500 hover:text-slate-700'}`}>{dark?'☀':'🌙'}</button>
                            <a href="https://github.com/daggerok/fundamentals/tree/master/docs" target="_blank" rel="noopener"
                               className={`flex-shrink-0 text-xs px-2 py-1 rounded transition-colors ${dark?'text-slate-400 hover:text-slate-200':'text-slate-500 hover:text-slate-700'}`}
                               title="Документация и требования">📄 docs</a>
                            {(company||pd)&&(
                                <React.Fragment>
                                    <Pill value={mode} options={['Y','Q']} onChange={setMode} dark={dark}/>
                                    <Pill value={view} options={[{k:'T',l:'⊞'},{k:'C',l:'◔'}]} onChange={setView} dark={dark}/>
                                </React.Fragment>
                            )}
                        </div>
                        <div className={`console-wrap ${showDebug&&logs.length>0?'open':''}`}>
                            <div className="console-inner">
                                <div className="pb-2 -mt-1">
                                    <div className={`${dark?'bg-slate-950 border-slate-800':'bg-slate-100 border-slate-200'} border rounded-lg px-3 py-1.5 font-mono text-[11px] overflow-x-auto whitespace-nowrap ${scCls}`}>
                                        {logs.map((l,i)=>(<span key={i}>{i>0&&<span className={dark?'text-slate-700':'text-slate-300'}> · </span>}<span className={l.startsWith('✅')?'text-emerald-500':l.startsWith('❌')?'text-red-500':mt}>{l}</span></span>))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div className="px-4 xl:px-8 py-6">
                    {!tickers&&!tkL&&(
                        <div className={`${card} border rounded-xl p-5 mb-6 text-sm max-w-3xl mx-auto`}>
                            <p className={`font-bold mb-3 ${t1}`}>Start two proxy terminals:</p>
                            <div className="grid md:grid-cols-2 gap-3">
                                <pre className={`${dark?'bg-slate-900 text-emerald-300':'bg-slate-50 text-emerald-700'} p-3 rounded text-xs font-mono`}>local-cors-proxy \{'\n'}  --proxyUrl https://www.sec.gov \{'\n'}  --port 8011</pre>
                                <pre className={`${dark?'bg-slate-900 text-emerald-300':'bg-slate-50 text-emerald-700'} p-3 rounded text-xs font-mono`}>local-cors-proxy \{'\n'}  --proxyUrl https://data.sec.gov \{'\n'}  --port 8012</pre>
                            </div>
                            <button onClick={init} className="mt-3 text-emerald-500 text-xs hover:underline">↻ Retry</button>
                        </div>
                    )}

                    {error&&(
                        <div className="bg-red-500/10 border border-red-500/20 text-red-500 px-4 py-3 rounded-xl mb-6 text-sm flex items-start gap-2 animate-fade-in max-w-3xl mx-auto">
                            <span className="flex-shrink-0 mt-0.5">✕</span><span className="flex-1">{error}</span>
                            <button onClick={init} className="text-xs hover:underline flex-shrink-0">Retry</button>
                        </div>
                    )}

                    {company&&!loading&&pd&&(
                        <div className="space-y-6 animate-fade-in">
                            {SEC.map(section=>{
                                const{metricSeries,computedSeries}=pd;
                                const allM=[
                                    ...section.metrics.map(m=>({...m,series:metricSeries[m.key]})),
                                    ...(section.computed||[]).map(c=>({...c,series:computedSeries[c.key]})),
                                ].filter(m=>hd(m.series));
                                if(!allM.length)return null;
                                const clr=TC[section.color][dark?'dark':'light'];
                                const hdr=dark?section.hc:section.hcL;

                                const header=(
                                    <div className={`px-4 py-3 border-b ${dark?'border-slate-700/50':'border-slate-200'} bg-gradient-to-r ${hdr} flex items-center justify-between gap-4`}>
                                        <h3 className={`font-bold ${clr.text}`} style={{fontSize:`${Math.round(16*scale)}px`}}>{section.title}</h3>
                                        <div className="flex items-center gap-2 flex-shrink-0">
                                            <span className={`text-[10px] ${mt}`}>A</span>
                                            <input type="range" min="0" max="100" value={scaleSlider}
                                                   onChange={e=>setScaleSlider(Number(e.target.value))}
                                                   className="scale-slider w-20" title={`Scale: ${Math.round(scale*100)}%`}/>
                                            <span className={`text-xs font-bold ${mt}`}>A</span>
                                        </div>
                                    </div>
                                );

                                if(view==='C')return(
                                    <div key={section.title} className={`${card} border rounded-xl overflow-hidden shadow-lg`}>
                                        {header}
                                        <div className="p-4 grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-4">
                                            {allM.map(m=><MiniChart key={m.key} data={m.series} color={clr} unit={m.unit} label={m.label} dark={dark} scale={scale}/>)}
                                        </div>
                                    </div>
                                );

                                const labels=pd.periodKeys.map(pk=>pd.getLabel(pk));
                                return(
                                    <div key={section.title} className={`${card} border rounded-xl overflow-hidden shadow-lg`}>
                                        {header}
                                        <div className={`overflow-x-auto ${scCls}`}>
                                            <table className="w-full text-left border-collapse" style={{fontSize:tblFs}}>
                                                <thead>
                                                <tr className={dark?'bg-slate-900/50':'bg-slate-50'}>
                                                    <th className={`px-4 sticky left-0 z-10 ${sB} font-semibold uppercase tracking-wider ${mt}`} style={{fontSize:tblHFs,paddingTop:tblCellPy,paddingBottom:tblCellPy}}>Metric</th>
                                                    {labels.map((l,i)=><th key={i} className={`px-4 text-right font-semibold uppercase tracking-wider ${mt}`} style={{fontSize:tblHFs,paddingTop:tblCellPy,paddingBottom:tblCellPy}}>{l}</th>)}
                                                </tr>
                                                </thead>
                                                <tbody className={`divide-y ${dark?'divide-slate-700/30':'divide-slate-100'}`}>
                                                {allM.map(m=>(
                                                    <tr key={m.key} className={`${hR} transition-colors`}>
                                                        <td className={`px-4 font-medium ${t1} sticky left-0 z-10 ${sB} whitespace-nowrap`} style={{paddingTop:tblCellPy,paddingBottom:tblCellPy}}>
                                                            {m.label}<span className={`ml-1 ${mt}`} style={{fontSize:`${Math.round(10*scale)}px`}}>({m.unit})</span>
                                                        </td>
                                                        {m.series.map((d,i)=>(
                                                            <td key={i} className={`px-4 text-right font-mono ${d.value!=null&&d.value<0?nc:t1}`} style={{paddingTop:tblCellPy,paddingBottom:tblCellPy}}>{fV(d.value,m.unit)}</td>
                                                        ))}
                                                    </tr>
                                                ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {loading&&(<div className={`text-center py-20 ${mt} flex items-center justify-center gap-3`}><div className={`animate-spin h-5 w-5 border-2 ${dark?'border-slate-500':'border-slate-400'} border-t-transparent rounded-full`}/>Loading…</div>)}
                    {!loading&&!error&&!company&&!tkL&&tickers&&(<div className={`text-center py-20 ${mt}`}><p className="text-lg">Enter a ticker above</p><p className="text-sm mt-1">AAPL · MSFT · GOOGL · AMZN · TSLA · NVDA</p></div>)}
                    {tkL&&(<div className={`text-center py-20 ${mt} flex items-center justify-center gap-3`}><div className={`animate-spin h-5 w-5 border-2 ${dark?'border-slate-500':'border-slate-400'} border-t-transparent rounded-full`}/>Connecting…</div>)}
                </div>
            </React.Fragment>
        );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
