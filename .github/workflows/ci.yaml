name: CI

on:
  push:
    branches: [ master, 'fix/*', 'chore/*' ]
  pull_request:
  workflow_dispatch:

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      # On pull requests, use the contributor's head commit rather than GitHub's
      # synthetic merge commit. Only that ref's two most recent commits are fetched.
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/package.json', '**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install -E

      - name: Sanity — index.html present
        run: test -f index.html && test -s index.html && echo "index.html OK"

  # Like daggerok/csv: verify latest npm modules still install cleanly
  npm-check-updates:
    runs-on: ubuntu-latest
    steps:
      # On pull requests, use the contributor's head commit rather than GitHub's
      # synthetic merge commit. Only that ref's two most recent commits are fetched.
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-ncu-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Bump deps to latest (ephemeral check — not committed)
        run: bunx npm-check-updates -u

      - name: Install updated dependencies
        run: bun install

      - name: Sanity — lockfile + index still valid
        run: |
          test -f package.json
          test -f index.html
          bun -e "const p=require('./package.json'); console.log('deps ok', Object.keys({...p.dependencies||{}, ...p.devDependencies||{}}).join(', '))"
