name: Dependency Updates

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch to update
        required: true
        default: master
      commit_message:
        description: Commit message
        required: true
        default: "chore(deps): update dependencies"

permissions:
  contents: write
  actions: write

concurrency:
  group: dependency-updates-${{ inputs.target_branch }}
  cancel-in-progress: false

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Update dependency versions
        run: bunx npm-check-updates -u

      - name: Install updated dependencies
        run: bun install -E

      - name: Sanity check
        run: |
          test -f package.json
          test -f index.html
          bun -e "JSON.parse(require('fs').readFileSync('package.json','utf8')); console.log('package.json valid')"

      - name: Detect repository changes
        id: changes
        run: |
          if git diff --quiet --exit-code; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push dependency updates
        if: steps.changes.outputs.changed == 'true'
        env:
          TARGET_BRANCH: ${{ inputs.target_branch }}
          COMMIT_MESSAGE: ${{ inputs.commit_message }}
        run: |
          git config user.name "Maksim Kostromin"
          git config user.email "daggerok@gmail.com"
          # runtime may have bun.lock
          git add package.json bun.lock 2>/dev/null || git add package.json
          if git diff --staged --quiet; then
            echo "No staged dependency changes — nothing to commit."
          else
            git commit -m "$COMMIT_MESSAGE"
            git push origin "HEAD:${TARGET_BRANCH}" || echo "Push failed (may be up-to-date or race condition)"
          fi

      - name: No dependency updates found
        if: steps.changes.outputs.changed != 'true'
        run: echo "No dependency updates were found. Nothing to commit."
